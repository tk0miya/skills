name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "{{NODE_VERSION}}"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CI
        run: npm run ci
