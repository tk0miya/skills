name: Biome migrate

on:
  push:
    branches: [main]
    paths:
      - "package-lock.json"

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ vars.REPO_HOUSEKEEPER_APP_ID }}
          private-key: ${{ secrets.REPO_HOUSEKEEPER_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run biome migrate
        run: npx biome migrate --write

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: chore/biome-migrate
          delete-branch: true
          commit-message: "chore: run biome migrate"
          title: "chore: run biome migrate"
          body: |
            Diff produced by running `biome migrate --write` to keep the configuration in sync with the installed `@biomejs/biome` version.
          labels: auto-merge
